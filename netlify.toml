[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* to the Cloud Run backend server-side, so the browser only ever
# calls same-origin /api/* (no CORS, and the Cloud Run URL stays out of the
# bundle). netlify.toml cannot interpolate env vars — after deploying Cloud Run,
# replace the host below with the real service URL:
#   gcloud run services describe operator-report-proxy --region <region> --format 'value(status.url)'
[[redirects]]
  from = "/api/*"
  to = "https://operator-report-proxy-304868514241.asia-south1.run.app/api/:splat"
  status = 200
  force = true

# SPA fallback — everything else serves the built index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers — hashed assets are immutable; index.html must revalidate.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
